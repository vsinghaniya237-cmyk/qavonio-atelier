<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qavonio | Contact Us</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@100;200;300;400;500&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        .subpage-hero { height: 40vh; display: flex; align-items: center; justify-content: center; position: relative; background: var(--bg-charcoal); border-bottom: 1px solid rgba(212, 175, 55, 0.1); padding-top: 80px;}
        .subpage-title { font-size: 3rem; color: var(--gold-light); letter-spacing: 5px; text-transform: uppercase; }
        .content-section { padding: 6rem 0; background: var(--bg-black); }
        .contact-methods { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; margin-bottom: 4rem; }
        .method-box { background: rgba(18, 18, 18, 0.5); padding: 3rem; border: 1px solid rgba(212, 175, 55, 0.2); text-align: center; }
        .method-icon { font-size: 2.5rem; color: var(--gold-primary); margin-bottom: 1.5rem; }
        @media(max-width: 768px) { .contact-methods { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar scrolled">
        <div class="nav-brand"><a href="index.html">Qavonio</a></div>
        <div class="nav-links">
            <a href="experience.html">Experience</a>
            <a href="menu.html">Menu</a>
            <a href="journey.html">The Journey</a>
            <a href="reviews.html">Reviews</a>
            <a href="contact.html">Contact</a>
        </div>
        <a href="reserve.html" class="nav-btn">Reserve</a>
    </nav>

    <!-- Header -->
    <section class="subpage-hero">
        <h1 class="subpage-title gs-reveal">Get in Touch</h1>
    </section>

    <!-- Main Content -->
    <section class="content-section">
        <div class="container">
            <div class="contact-methods gs-reveal">
                <div class="method-box">
                    <i class="fas fa-phone method-icon"></i>
                    <h3 class="dish-name" style="font-size: 1.5rem;">Phone</h3>
                    <p class="section-desc">+91 98765 43210</p>
                    <p class="section-desc" style="font-size: 0.8rem;">Available 10am - 10pm</p>
                </div>
                <div class="method-box">
                    <i class="fas fa-envelope method-icon"></i>
                    <h3 class="dish-name" style="font-size: 1.5rem;">Email</h3>
                    <p class="section-desc">reserve@qavonio.com</p>
                    <p class="section-desc" style="font-size: 0.8rem;">We reply within 24 hours</p>
                </div>
                <div class="method-box">
                    <i class="fab fa-whatsapp method-icon"></i>
                    <h3 class="dish-name" style="font-size: 1.5rem;">WhatsApp</h3>
                    <p class="section-desc">Instant Booking</p>
                    <a href="https://wa.me/919876543210" class="btn-whatsapp" style="margin-top: 1rem;">Message Us</a>
                </div>
            </div>
            
            <div class="reservation-form gs-reveal" style="max-width: 800px;">
                <h2 class="section-title text-center" style="font-size: 2rem;">Send a Message</h2>
                <div class="form-group mb-4">
                    <input type="text" class="form-input" placeholder="Your Name">
                </div>
                <div class="form-group mb-4">
                    <input type="email" class="form-input" placeholder="Your Email">
                </div>
                <div class="form-group mb-4">
                    <textarea class="form-input" rows="5" placeholder="Your Message"></textarea>
                </div>
                <button class="btn-primary w-100">Send Message</button>
            </div>
            
            <div class="text-center mt-5 gs-reveal">
                <a href="index.html" class="btn-outline">Return to Home</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <div class="footer-brand">
                <h2 style="font-size: 2rem; color: var(--gold-light);">Qavonio</h2>
                <p style="color: var(--gold-dark); letter-spacing: 5px;">by QavoniX Studio</p>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
